<body>
<script>document.documentElement.dataset.theme = localStorage.getItem('autoteam_theme') || 'dark';</script>
<div class="auth-screen" id="auth-screen">
  <div class="auth-box">
    <button class="btn sm theme-btn auth-theme" id="auth-theme-btn" onclick="toggleTheme()">Tối</button>
    <div class="brand"><div class="mark">AT</div><div><h1>AutoTeam PM</h1><p>PROJECT · E-OFFICE · BOM · TEAM</p></div></div>
    <div class="tabs"><button class="tab active" id="login-tab" onclick="switchAuth('login')">Đăng nhập</button><button class="tab" id="register-tab" onclick="switchAuth('register')">Đăng ký</button></div>
    <div id="login-form">
      <div class="field"><label>Email hoặc username</label><input id="login-email" value="admin@autoteam.com" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="field"><label>Mật khẩu</label><input id="login-password" type="password" value="admin123" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="btn primary" style="width:100%;justify-content:center" onclick="doLogin()">Đăng nhập</button>
      <button class="btn" style="width:100%;justify-content:center;margin-top:8px" onclick="forgotPassword()">Quên / Reset mật khẩu</button>
      <p class="sub" style="text-align:center;line-height:1.7">Demo: <span class="mono">admin@autoteam.com / admin123</span><br><span class="mono">hung@autoteam.com / 123456</span></p>
    </div>
    <div id="register-form" class="hidden">
      <div class="field"><label>Họ tên</label><input id="reg-name"></div>
      <div class="form-grid"><div class="field"><label>Email</label><input id="reg-email"></div><div class="field"><label>Username</label><input id="reg-user"></div></div>
      <div class="form-grid"><div class="field"><label>Mật khẩu</label><input id="reg-pass" type="password"></div><div class="field"><label>Điện thoại</label><input id="reg-phone"></div></div>

    <nav class="nav" id="nav"></nav>

      <div class="user-mini"><div class="avatar" id="u-avatar">?</div><div><div class="u-name" id="u-name">-</div><div class="u-role" id="u-role">-</div></div><button class="btn sm" onclick="logout()">Thoát</button></div>

</div>
<div class="toast" id="toast"></div>

<script>
const API = '';
const PHASES = ["Budget Approval","Bidding / Tender","EPC Contract","Engineering / Design","Procurement","Construction","Commissioning","Handover / Close-out"];
const PHASE_ICONS = ["1","2","3","4","5","6","7","8"];
const NAV = [
  {id:'dashboard', icon:'◆', label:'Dashboard', sub:'Tổng quan'},
  {id:'projects', icon:'P', label:'Projects', sub:'Dự án'},
  {id:'phases', icon:'G', label:'Phase/Groups', sub:'Giai đoạn'},
  {id:'tasks', icon:'T', label:'Tasks', sub:'Kanban'},
  {id:'documents', icon:'D', label:'Documents', sub:'MDR'},
  {id:'eoffice', icon:'E', label:'E-Office', sub:'Văn bản'},
  {id:'materials', icon:'M', label:'Materials', sub:'Vật tư'},
  {id:'bom', icon:'B', label:'BOM/Proc.', sub:'Mua sắm'},
  {id:'team', icon:'U', label:'Team', sub:'Nhân sự'},
  {id:'chat', icon:'C', label:'Chat', sub:'Trao đổi'},
  {id:'reports', icon:'R', label:'Reports', sub:'Báo cáo'},
  {id:'admin', icon:'A', label:'Admin', sub:'Quản trị'},
];
let state = {
  projects:[], tasks:[], members:[], docs:[], stats:{}, groups:[], projectPhases:[], issues:[],
  notifications:[], boms:[], eoffice:[], materials:[], categories:[], report:{},
  users:[], roles:null, loginHistory:[], auditLogs:[], emailLogs:[], eofficeEmails:[],
  appInfo:{version:'', release_date:'', build_label:''}, appUpdates:[],
  taskComments:[], taskHistory:[], docRevisions:[], docComments:[], transmittals:[],
  conversations:[], messages:[], rfqs:[], quotations:[], deliveries:[], timesheets:[], backups:[]
};
const PANEL_PATHS = {
  dashboard:'/', projects:'/projects', phases:'/phases', tasks:'/tasks',
  documents:'/documents', eoffice:'/eoffice', materials:'/materials', bom:'/bom',
  team:'/team', chat:'/chat', reports:'/reports', admin:'/admin'
};
const PATH_PANELS = Object.fromEntries(Object.entries(PANEL_PATHS).map(([panel,path])=>[path,panel]).concat([['/dashboard','dashboard']]));
function panelFromPath(path=window.location.pathname){
  const clean = (path || '/').replace(/\/+$/,'') || '/';
  return PATH_PANELS[clean] || 'dashboard';
}
function pathForPanel(panel){ return PANEL_PATHS[panel] || '/'; }
let currentPanel = panelFromPath();
let currentUser = null;
let token = localStorage.getItem('autoteam_token') || '';
let modalState = {kind:null, item:null, extra:null};
let filters = {project:'', task:'', taskProject:'', taskStatus:'', material:'', materialCat:'', doc:'', eoffice:'', bom:''};
let theme = localStorage.getItem('autoteam_theme') || 'dark';
let currentConversation = null;
let scheduleSelectedId = localStorage.getItem('autoteam_schedule_selected') || '';
let scheduleExpanded = (()=>{ try { return JSON.parse(localStorage.getItem('autoteam_schedule_expanded')||'{}'); } catch { return {}; }})();
const columnDefs = [
  { key: "code", label: "WBS / ID", defaultWidth: 105, minWidth: 80 },
  { key: "name", label: "Name", defaultWidth: 430, minWidth: 220 },
  { key: "duration", label: "Duration", defaultWidth: 88, minWidth: 80 },
  { key: "start", label: "Start", defaultWidth: 120, minWidth: 100 },
  { key: "finish", label: "Finish", defaultWidth: 120, minWidth: 100 },
  { key: "owner", label: "Assigned To", defaultWidth: 150, minWidth: 120 },
  { key: "status", label: "Status", defaultWidth: 125, minWidth: 100 },
  { key: "progress", label: "Progress", defaultWidth: 135, minWidth: 110 },
  { key: "action", label: "Action", defaultWidth: 90, minWidth: 70 },
];
function clampNumber(value,min,max){ return Math.max(min, Math.min(max, Number(value)||0)); }
let taskScheduleColumnWidths = (() => {
  try { return JSON.parse(localStorage.getItem('taskScheduleColumnWidths') || '{}') || {}; } catch { return {}; }
})();
let taskScheduleRightPanelWidth = clampNumber(localStorage.getItem('taskScheduleRightPanelWidth') || 500, 380, 760);

const $ = id => document.getElementById(id);
const money = n => new Intl.NumberFormat('vi-VN').format(Number(n||0));
const esc = s => String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const initials = name => (name||'?').split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();
const today = () => new Date().toISOString().slice(0,10);
function badge(text, cls=''){ return `<span class="badge ${cls}">${esc(text||'-')}</span>`; }
function statusClass(s=''){ s=String(s).toLowerCase(); if(s.includes('done')||s.includes('closed')||s.includes('approved')||s.includes('issued')||s.includes('active'))return'b-green'; if(s.includes('progress')||s.includes('review')||s.includes('assigned'))return'b-blue'; if(s.includes('hold')||s.includes('pending')||s.includes('draft')||s.includes('need'))return'b-amber'; if(s.includes('over')||s.includes('reject')||s.includes('cancel')||s.includes('suspend'))return'b-red'; return'b-teal'; }
function priorityClass(s=''){ return s==='Cao'||s==='High'||s==='Critical'?'b-red':s==='Trung bình'||s==='Medium'?'b-amber':'b-blue'; }

function applyTheme(){
  document.documentElement.dataset.theme = theme;
  localStorage.setItem('autoteam_theme', theme);
  const label = theme === 'light' ? 'Sáng' : 'Tối';
  const icon = theme === 'light' ? '☀ ' : '◐ ';
  ['theme-btn','auth-theme-btn'].forEach(id => {
    const el = $(id);
    if(el) el.textContent = icon + label;
  });
}
function toggleTheme(){
  theme = theme === 'light' ? 'dark' : 'light';
  applyTheme();
  logInteraction('toggle_theme', 'ui', theme);
}
applyTheme();

function authHeaders(){
  const h = {'Content-Type':'application/json'};
  if(token) h.Authorization = 'Bearer ' + token;
  return h;
}
async function api(method, path, body){
  const opts = {method, headers: authHeaders()};
  if(body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  if(!res.ok){
    let msg = await res.text();
    try { msg = JSON.parse(msg).detail || msg; } catch {}
    throw new Error(msg || res.statusText);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : {};
}
const GET = p => api('GET', p);
const POST = (p,b) => api('POST', p, b);
const PUT = (p,b) => api('PUT', p, b);
const DEL = p => api('DELETE', p);
async function safeGet(path, fallback){
  try { return await GET(path); } catch(e) { return fallback; }
}

async function logInteraction(action, module='app', detail=''){
  if(!token) return;
  try { await POST('/api/audit-logs', {action, module, detail}); } catch(e) {}
}

function renderVersion(){
  const info = state.appInfo || {};
  const version = info.version ? 'v' + info.version : 'v...';
  const build = info.build_label ? ' · ' + info.build_label : '';
  const release = info.release_date ? ' · ' + info.release_date : '';
  const side = $('app-version');
  const top = $('top-version');
  if(side) side.textContent = version + build;
  if(top) top.textContent = version + release;
}

async function loadAppInfo(){
  const [appInfo, appUpdates] = await Promise.all([
    safeGet('/api/app-info', state.appInfo || {}),
    safeGet('/api/app-updates', state.appUpdates || [])
  ]);
  state.appInfo = appInfo || state.appInfo;
  state.appUpdates = appUpdates || [];
  renderVersion();
}

function toast(msg, type='ok'){
  const t = $('toast');
  t.textContent = msg;
  t.style.borderColor = type==='err' ? 'rgba(239,68,68,.5)' : 'rgba(45,212,191,.5)';
  t.className = 'toast show';
  setTimeout(()=>t.className='toast', 2600);
}

function switchAuth(mode){
  $('login-tab').classList.toggle('active', mode==='login');
  $('register-tab').classList.toggle('active', mode==='register');
  $('login-form').classList.toggle('hidden', mode!=='login');
  $('register-form').classList.toggle('hidden', mode!=='register');
}
async function doLogin(){
  try{
    const data = await POST('/api/auth/login', {email:$('login-email').value.trim(), password:$('login-password').value});
    token = data.token; currentUser = data.user;
    localStorage.setItem('autoteam_token', token);
    localStorage.setItem('autoteam_user', JSON.stringify(currentUser));
    $('auth-screen').classList.add('hidden'); $('app').classList.remove('hidden');
    hydrateUser(); await loadAll(); toast('Đăng nhập thành công');
  }catch(e){ toast(e.message, 'err'); }
}
async function doRegister(){
  try{
    const body = {full_name:v('reg-name'),email:v('reg-email'),username:v('reg-user'),password:v('reg-pass'),phone:v('reg-phone'),department:v('reg-dept'),position:v('reg-position'),skills:v('reg-skills')};
    if(!body.full_name || !body.email || !body.password) throw new Error('Vui lòng nhập họ tên, email và mật khẩu');
    await POST('/api/auth/register', body);
    toast('Đã đăng ký. Chờ Admin duyệt tài khoản.');
    switchAuth('login');
  }catch(e){ toast(e.message, 'err'); }
}
async function forgotPassword(){
  try{
    const email = prompt('Nhập email hoặc username cần reset mật khẩu');
    if(!email) return;
    const data = await POST('/api/auth/forgot-password', {email});
    const tokenText = data.reset_token ? ` Token demo: ${data.reset_token}` : '';
    toast((data.message || 'Đã tạo yêu cầu reset.') + tokenText);
  }catch(e){ toast(e.message, 'err'); }
}
async function checkAuth(){
  if(!token) return;
  try{
    currentUser = await GET('/api/auth/me');
    $('auth-screen').classList.add('hidden'); $('app').classList.remove('hidden');
    hydrateUser(); await loadAll();
  }catch{
    localStorage.removeItem('autoteam_token'); token = '';
  }
}
async function logout(){
  try{ await POST('/api/auth/logout', {}); }catch{}
  localStorage.removeItem('autoteam_token'); localStorage.removeItem('autoteam_user');
  token=''; currentUser=null; $('app').classList.add('hidden'); $('auth-screen').classList.remove('hidden');
}
function hydrateUser(){
  const u = currentUser || {};
  $('u-name').textContent = u.full_name || '-';
  $('u-role').textContent = u.role_name || u.role || '-';
  $('u-avatar').textContent = initials(u.full_name);
  $('u-avatar').style.background = u.avatar_color || 'var(--teal)';
}
function canAdmin(){ return ['super_admin','admin','manager'].includes(currentUser?.role); }

async function loadAll(){
  const [projects,tasks,members,docs,stats,groups,projectPhases,issues,notifications,boms,eoffice,materials,categories,report,roles,emailLogs,appInfo,appUpdates,taskComments,taskHistory,docRevisions,docComments,transmittals,conversations,rfqs,quotations,deliveries,timesheets,eofficeEmails] = await Promise.all([
    safeGet('/api/projects', []), safeGet('/api/tasks', []), safeGet('/api/members', []),
    safeGet('/api/documents', []), safeGet('/api/stats', {}), safeGet('/api/work-groups', []),
    safeGet('/api/project-phases', []), safeGet('/api/issues', []), safeGet('/api/notifications', []), safeGet('/api/boms', []),
    safeGet('/api/eoffice', []), safeGet('/api/inventory/items', []), safeGet('/api/inventory/categories', []),
    safeGet('/api/reports/summary', {}), safeGet('/api/auth/roles', null), safeGet('/api/email-logs', []),
    safeGet('/api/app-info', state.appInfo || {}), safeGet('/api/app-updates', []),
    safeGet('/api/task-comments', []), safeGet('/api/task-history', []),
    safeGet('/api/document-revisions', []), safeGet('/api/document-comments', []),
    safeGet('/api/transmittals', []), safeGet('/api/conversations', []),
    safeGet('/api/rfqs', []), safeGet('/api/quotations', []), safeGet('/api/deliveries', []),
    safeGet('/api/timesheets', []), safeGet('/api/eoffice/latest-emails', [])
  ]);
  state = {...state, projects,tasks,members,docs,stats,groups,projectPhases,issues,notifications,boms,eoffice,materials,categories,report,roles,emailLogs,appInfo,appUpdates,taskComments,taskHistory,docRevisions,docComments,transmittals,conversations,rfqs,quotations,deliveries,timesheets,eofficeEmails};
  if(canAdmin()){
    state.users = await safeGet('/api/users', []);
    state.loginHistory = await safeGet('/api/login-history', []);
    state.auditLogs = await safeGet('/api/audit-logs', []);
    state.backups = await safeGet('/api/backups', []);
  }
  renderVersion();
  renderNav(); render();
}

function renderNav(){
  const groups = [
    ['Core', ['dashboard','projects','phases','tasks']],
    ['Engineering', ['documents','eoffice','materials','bom']],
    ['Control', ['team','chat','reports','admin']]
  ];
  const count = id => ({
    projects: state.projects.length, tasks: state.tasks.filter(t=>t.status!=='Done').length,
    materials: state.materials.length, bom: state.boms.length, chat: state.conversations.length,
    admin: state.users.filter(u=>u.status==='pending').length
  }[id] || 0);
  $('nav').innerHTML = groups.map(([label, ids]) => `
    <div class="nav-label">${label}</div>
    ${ids.filter(id=>id!=='admin'||canAdmin()).map(id => {
      const n = NAV.find(x=>x.id===id);
      const c = count(id);
      return `<button class="nav-btn ${currentPanel===id?'active':''}" onclick="showPanel('${id}')"><span class="nav-ico">${n.icon}</span><span>${n.label}</span>${c?`<span class="nav-count">${c}</span>`:''}</button>`;
    }).join('')}
  `).join('');
  $('notif-count').textContent = state.notifications.filter(n=>!n.is_read).length;
}
function showPanel(id, pushUrl=true){
  currentPanel = id;
  if(pushUrl){
    const path = pathForPanel(id);
    if(window.location.pathname !== path) history.pushState({panel:id}, '', path);
  }
  renderNav();
  render();
  logInteraction('view_panel', 'navigation', id);
}
window.addEventListener('popstate', () => showPanel(panelFromPath(), false));
function setTitle(title, sub){
  $('page-title').innerHTML = `${title}<span>${sub||''}</span>`;
  const canAdd = !['dashboard','reports','admin','notifications'].includes(currentPanel);
  $('add-btn').style.display = canAdd ? '' : 'none';
}
function render(){
  const map = {
    dashboard: renderDashboard, projects: renderProjects, phases: renderPhases, tasks: renderTasks,
    documents: renderDocuments, eoffice: renderEOffice, materials: renderMaterials, bom: renderBOM,
    team: renderTeam, chat: renderChat, reports: renderReports, admin: renderAdmin, notifications: renderNotifications
  };
  (map[currentPanel] || renderDashboard)();
}

function renderDashboard(){
  setTitle('Dashboard','Tổng quan hệ thống theo spec MVP');
  const s = state.stats;
  $('content').innerHTML = `
    <div class="grid stats">
      ${stat('Dự án',s.projects,'Tổng project', 'var(--blue)')}
      ${stat('Task mở',s.tasks_open,'Đang xử lý', 'var(--amber)')}
      ${stat('Hoàn thành',s.tasks_done,'Task done', 'var(--green)')}
      ${stat('Quá hạn',s.tasks_overdue,'Cần xử lý', 'var(--coral)')}
      ${stat('Vật tư',s.inventory_items,'Material DB', 'var(--teal)')}
      ${stat('BOM',s.boms,'Procurement', 'var(--violet)')}
    </div>
    <div class="grid two" style="margin-top:14px">
      <div class="card"><div class="card-h"><h3>Dự án & phase</h3><button class="btn sm" onclick="showPanel('projects')">Mở</button></div>${projectMiniList()}</div>
      <div class="card"><div class="card-h"><h3>Việc cần chú ý</h3><button class="btn sm" onclick="showPanel('tasks')">Kanban</button></div>${deadlineList()}</div>
    </div>
    <div class="grid three" style="margin-top:14px">
      <div class="card"><div class="card-h"><h3>Issue/Risk mở</h3><button class="btn sm" onclick="openModal('issue')">Thêm issue</button></div>${issueMiniList()}</div>
      <div class="card"><div class="card-h"><h3>Thông báo</h3><button class="btn sm" onclick="showPanel('notifications')">Xem</button></div>${notificationMiniList()}</div>
      <div class="card"><div class="card-h"><h3>Workload team</h3><button class="btn sm" onclick="showPanel('team')">Team</button></div>${workloadMini()}</div>
    </div>`;
}
function stat(k,v,s,c){ return `<div class="card stat" style="--c:${c}"><div class="k">${k}</div><div class="v">${v??0}</div><div class="s">${s}</div></div>`; }
function projectMiniList(){
  if(!state.projects.length) return empty('Chưa có dự án');
  return `<div class="mini-list">${state.projects.slice(0,6).map(p=>`
    <div class="mini-row"><span class="dot" style="background:${projectColor(p.type)}"></span><div><b>${esc(p.name)}</b><div class="sub">${esc(p.type)} · ${esc(p.current_phase)}</div><div class="progress"><div style="width:${Number(p.progress||0)}%;background:${projectColor(p.type)}"></div></div></div><span class="mono">${p.progress||0}%</span></div>`).join('')}</div>`;
}
function deadlineList(){
  const list = state.tasks.filter(t=>t.status!=='Done').sort((a,b)=>(a.due_date||'9999').localeCompare(b.due_date||'9999')).slice(0,8);
  if(!list.length) return empty('Không có task mở');
  return `<div class="mini-list">${list.map(t=>`<div class="mini-row"><span class="dot" style="background:${t.due_date<today()?'var(--danger)':'var(--amber)'}"></span><div><b>${esc(t.title)}</b><div class="sub">${esc(t.project_name||'-')} · ${esc(t.assignee_name||'Unassigned')}</div></div>${badge(t.due_date||'-',t.due_date<today()?'b-red':'b-amber')}</div>`).join('')}</div>`;
}
function issueMiniList(){
  const list = state.issues.filter(i=>i.status!=='Closed').slice(0,6);
  if(!list.length) return empty('Không có issue mở');
  return `<div class="mini-list">${list.map(i=>`<div class="mini-row"><span class="dot" style="background:${i.severity==='High'||i.severity==='Critical'?'var(--danger)':'var(--amber)'}"></span><div><b>${esc(i.title)}</b><div class="sub">${esc(i.project_name||'-')} · ${esc(i.owner_name||'-')}</div></div>${badge(i.severity,priorityClass(i.severity))}</div>`).join('')}</div>`;
}
function notificationMiniList(){
  const list = state.notifications.slice(0,6);
  if(!list.length) return empty('Không có thông báo');
  return `<div class="mini-list">${list.map(n=>`<div class="mini-row"><span class="dot" style="background:${n.is_read?'var(--sub)':'var(--teal)'}"></span><div><b>${esc(n.title)}</b><div class="sub">${esc(n.message||'')}</div></div>${badge(n.notification_type,'b-blue')}</div>`).join('')}</div>`;
}
function workloadMini(){
  const rows = state.report.workload || [];
  if(!rows.length) return empty('Chưa có dữ liệu workload');
  return rows.slice(0,6).map(r=>`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between"><span>${esc(r.name)}</span><span class="mono">${r.open_tasks||0}</span></div><div class="progress"><div style="width:${Math.min(100,(r.open_tasks||0)*18)}%;background:${(r.open_tasks||0)>4?'var(--coral)':'var(--teal)'}"></div></div></div>`).join('');
}
function projectColor(type){ return type==='Oil & Gas'?'var(--amber)':type==='Power Plant'?'var(--blue)':type==='Mining'?'var(--violet)':'var(--teal)'; }
function empty(text){ return `<div class="empty">${esc(text)}</div>`; }
function exportRows(filename, rows){
  const list = rows || [];
  if(!list.length){ toast('Không có dữ liệu để export','err'); return; }
  const cols = Object.keys(list[0]);
  const csv = [cols.join(',')].concat(list.map(r=>cols.map(c=>`"${String(r[c]??'').replace(/"/g,'""')}"`).join(','))).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv;charset=utf-8'}));
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
  logInteraction('export', 'report', filename);
}

function renderProjects(){
  setTitle('Projects','Project list, issue/risk và trạng thái');
  const q = filters.project.toLowerCase();
  const list = state.projects.filter(p=>!q || `${p.name} ${p.client} ${p.type} ${p.status}`.toLowerCase().includes(q));

function phaseRows(){
  const rows = [];
  state.projects.forEach(p => PHASES.forEach((ph, idx) => {
    const groups = state.groups.filter(g=>g.project_id===p.id && g.phase_name===ph);
    const tasks = state.tasks.filter(t=>t.project_id===p.id && (t.phase_name===ph || groups.some(g=>g.id===t.work_group_id)));
    if(groups.length || tasks.length || ph===p.current_phase){
      rows.push({project:p, phase:ph, index:idx, groups, tasks});
    }
  }));
  if(!rows.length) return `<tr><td colspan="7">${empty('Chưa có phase/work group')}</td></tr>`;

    const progress = phaseProgress(r);
    const status = phaseStatus(r);

      <td>${badge((r.index+1)+'. '+r.phase, r.phase===r.project.current_phase?'b-blue':'')}</td>
      <td>${r.groups.map(g=>`<div><b>${esc(g.group_name)}</b> ${badge(g.status,statusClass(g.status))}<div class="sub">Owner: ${esc(g.owner_name||'-')} · Due ${esc(g.due_date||'-')}</div></div>`).join('<hr style="border:0;border-top:1px solid var(--line);margin:8px 0">') || '<span class="sub">Chưa có group</span>'}</td>
      <td><span class="mono">${r.tasks.length}</span><div class="sub">${r.tasks.filter(t=>t.status==='Done'||t.status==='Closed').length} closed/done</div></td>
      <td><div class="progress"><div style="width:${progress}%;background:${projectColor(r.project.type)}"></div></div><div class="sub">${progress}%</div></td>
      <td>${badge(status,statusClass(status))}</td>
      <td><button class="btn sm" onclick="openPhaseTask('${r.project.id}','${escAttr(r.phase)}')">Task</button></td>
    </tr>`;
  }).join('');
}
function phaseProgress(row){
  if(row.tasks.length){
    const done = row.tasks.filter(t=>['Done','Closed','Approved'].includes(t.status)).length;
    return Math.round(done / row.tasks.length * 100);
  }
  if(row.groups.length){
    return Math.round(row.groups.reduce((sum,g)=>sum+Number(g.progress||0),0)/row.groups.length);
  }
  return row.phase===row.project.current_phase ? Number(row.project.progress||0) : 0;
}
function phaseStatus(row){
  if(row.tasks.some(t=>t.due_date && t.due_date<today() && !['Done','Closed'].includes(t.status))) return 'Overdue';
  if(row.tasks.length && row.tasks.every(t=>['Done','Closed','Approved'].includes(t.status))) return 'Completed';
  if(row.groups.some(g=>g.status==='In Progress') || row.phase===row.project.current_phase) return 'In Progress';
  return row.groups.length ? 'Not Started' : 'Planned';
}

function daysBetween(start, finish){
  if(!start || !finish) return 0;
  const a = new Date(start), b = new Date(finish);
  if(Number.isNaN(+a) || Number.isNaN(+b)) return 0;
  return Math.max(0, Math.round((b-a)/86400000)+1);
}
function nodeDuration(n){ return Number(n.duration || n.duration_days || daysBetween(n.start, n.finish) || 0); }
function validDate(v){
  if(!v) return '';
  const s = String(v).slice(0,10);
  return Number.isNaN(+new Date(s)) ? '' : s;
}
function minDate(values){
  const dates = values.map(validDate).filter(Boolean).sort((a,b)=>new Date(a)-new Date(b));
  return dates[0] || '';
}
function maxDate(values){
  const dates = values.map(validDate).filter(Boolean).sort((a,b)=>new Date(b)-new Date(a));
  return dates[0] || '';
}
function weightedProgress(children, fallback=0){
  const rows = (children||[]).filter(Boolean);
  if(!rows.length) return Number(fallback||0);
  const weight = n => Math.max(1, nodeDuration(n));
  const totalWeight = rows.reduce((sum,n)=>sum+weight(n),0);
  return Math.round(rows.reduce((sum,n)=>sum+Number(n.progress||0)*weight(n),0)/Math.max(1,totalWeight));
}
function activityLeaves(nodes){
  return (nodes||[]).flatMap(n => n.type === 'task' ? [n] : activityLeaves(n.children||[]));
}
function rollupDates(activities, fallbackStart='', fallbackFinish=''){
  const rows = (activities||[]).filter(Boolean);
  const start = rows.length ? minDate(rows.map(a=>a.start)) : validDate(fallbackStart);
  const finish = rows.length ? maxDate(rows.map(a=>a.finish)) : validDate(fallbackFinish);
  return {start, finish, duration: daysBetween(start, finish)};
}
function rollupStatus(children, fallback='Planned'){
  const rows = (children||[]).filter(Boolean);
  const done = ['Done','Closed','Approved','Completed'];
  if(rows.some(n=>n.finish && validDate(n.finish)<today() && !done.includes(n.status))) return 'Overdue';
  if(rows.length && rows.every(n=>done.includes(n.status))) return 'Completed';
  if(rows.some(n=>['In Progress','Review','Assigned'].includes(n.status) || Number(n.progress||0)>0)) return 'In Progress';
  return fallback || 'Planned';
}
function projectPhaseTree(project){
  const phases = projectPhaseRows(project);
  return phases.map((ph,idx)=>{
    const groups = state.groups.filter(g=>g.project_id===project.id && g.phase_name===ph.phase_name).sort((a,b)=>(a.display_order||0)-(b.display_order||0));
    const groupIds = new Set(groups.map(g=>g.id));
    const groupNodes = groups.map((g,gidx)=>{
      const taskChildren = state.tasks.filter(t=>t.work_group_id===g.id).map((t,tidx)=>taskNode(t,`A${idx+1}${gidx+1}${tidx+1}`));
      const dates = rollupDates(taskChildren, g.start_date, g.due_date);
      return {
        id:'group:'+g.id,type:'group',entityId:g.id,raw:g,parentId:'phase:'+(ph.id||project.id+':'+ph.phase_name),
        code:g.wbs_code || `WP-${idx+1}.${gidx+1}`,name:g.group_name,start:dates.start,finish:dates.finish,duration:taskChildren.length ? dates.duration : (Number(g.duration_days||0) || dates.duration),
        owner:'—',ownerId:'',status:rollupStatus(taskChildren,g.status||'Not Started'),progress:weightedProgress(taskChildren,g.progress),
        priority:'Medium',children:taskChildren
      };
    });
    const loose = state.tasks.filter(t=>t.project_id===project.id && t.phase_name===ph.phase_name && !groupIds.has(t.work_group_id))
      .map((t,tidx)=>taskNode(t,`A${idx+1}0${tidx+1}`));
    const children = groupNodes.concat(loose);
    const activities = activityLeaves(children);
    const dates = rollupDates(activities, ph.start_date, ph.due_date);
    return {
      id:'phase:'+(ph.id||project.id+':'+ph.phase_name),type:'phase',entityId:ph.id||'',raw:ph,parentId:'project:'+project.id,
      code:ph.wbs_code || `WBS-${idx+1}`,name:ph.phase_name,start:dates.start,finish:dates.finish,duration:activities.length ? dates.duration : (Number(ph.duration_days||0) || dates.duration),
      owner:'—',ownerId:'',status:rollupStatus(activities,ph.status||'Planned'),
      progress:weightedProgress(activities,ph.progress),
      priority:'Medium',children
    };
  });
}
function taskNode(t, fallbackCode){
  return {id:'task:'+t.id,type:'task',entityId:t.id,raw:t,parentId:t.parent_id||t.work_group_id||t.phase_name||t.project_id,
    code:t.wbs_code||fallbackCode||t.id,name:t.title,start:validDate(t.start_date),finish:validDate(t.due_date),duration:Number(t.duration_days||0) || daysBetween(t.start_date,t.due_date),
    owner:t.assignee_name||'Unassigned',ownerId:t.assignee_id||'',reviewerId:t.reviewer_id||'',approverId:t.approver_id||'',
    status:t.status||'Todo',progress:Number(t.progress||0),priority:t.priority||'Medium',children:[]};
}
function buildScheduleTree(){
  const pFilter = filters.taskProject;
  const q = (filters.task||'').toLowerCase();
  const sFilter = filters.taskStatus;
  const nodes = state.projects.filter(p=>!pFilter || p.id===pFilter).map((p,pidx)=>{
    const children = projectPhaseTree(p);
    const activities = activityLeaves(children);
    const dates = rollupDates(activities, p.start_date, p.deadline);
    return {id:'project:'+p.id,type:'project',entityId:p.id,raw:p,parentId:'',code:p.wbs_code||`PRJ-${pidx+1}`,
      name:p.name,start:dates.start,finish:dates.finish,duration:activities.length ? dates.duration : dates.duration,
      owner:'—',ownerId:'',status:rollupStatus(activities,p.status||'In Progress'),progress:weightedProgress(activities,p.progress),
      priority:'High',children};
  }).map(n=>filterScheduleNode(n,q,sFilter)).filter(Boolean);
  if(q || sFilter) setScheduleExpansion(nodes,true,false);
  else if(!Object.keys(scheduleExpanded).length) setScheduleExpansion(nodes,true,false);
  return nodes;
}
function filterScheduleNode(node,q,status){
  const children = (node.children||[]).map(c=>filterScheduleNode(c,q,status)).filter(Boolean);
  const ownText = `${node.code} ${node.name} ${node.owner} ${node.status}`.toLowerCase();
  const ownMatch = (!q || ownText.includes(q)) && (!status || node.status===status);
  if(ownMatch || children.length) return {...node,children};
  return null;
}
function flattenSchedule(nodes, level=0){
  return nodes.flatMap(n=>{
    const row = {...n,level};
    return scheduleExpanded[n.id] && n.children?.length ? [row, ...flattenSchedule(n.children, level+1)] : [row];
  });
}
function allScheduleNodes(nodes){ return nodes.flatMap(n=>[n,...allScheduleNodes(n.children||[])]); }
function setScheduleExpansion(nodes, expanded, renderNow=true){
  allScheduleNodes(nodes).forEach(n=>{ if(n.children?.length) scheduleExpanded[n.id]=expanded; });

  if(renderNow) renderTasks();
}

}
function startScheduleColumnResize(event,key){
  event.preventDefault(); event.stopPropagation();
  const def = columnDefs.find(c=>c.key===key);
  const startX = event.clientX;
  const startWidth = columnWidth(key);
  document.body.classList.add('schedule-resizing');
  const onMove = e => {
    taskScheduleColumnWidths[key] = clampNumber(startWidth + e.clientX - startX, def.minWidth, 900);
    saveColumnWidths();
    renderTasks();
  };
  const onUp = () => {
    document.body.classList.remove('schedule-resizing');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}
function resetScheduleColumnWidth(event,key){
  event.preventDefault(); event.stopPropagation();
  delete taskScheduleColumnWidths[key];
  saveColumnWidths();
  renderTasks();
}
function startSchedulePanelResize(event){

    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function addScheduleChild(){
  const n=selectedScheduleNode(); if(!n)return;

async function saveScheduleDetail(){
  const n = selectedScheduleNode(); if(!n)return;
  const name=v('s-name'), code=v('s-code'), start=v('s-start'), finish=v('s-finish'), duration=Number(v('s-duration')||0), progress=Number(v('s-progress')||0), status=v('s-status'), priority=v('s-priority'), owner=v('s-owner');
  if(n.type==='project'){ const p=n.raw; await PUT('/api/projects/'+n.entityId,{name,type:p.type,client:p.client,description:p.description,start_date:p.start_date||'',deadline:p.deadline||'',leader_id:p.leader_id||'',progress:Number(p.progress||0),status,current_phase:p.current_phase,phase_notes:p.phase_notes||'{}'}); }
  if(n.type==='phase'){ const ph=n.raw; await PUT('/api/project-phases/'+n.entityId,{project_id:ph.project_id,phase_name:name,start_date:ph.start_date||'',due_date:ph.due_date||'',status,progress:Number(ph.progress||0),display_order:Number(ph.display_order||0),notes:ph.notes||'',parent_id:ph.parent_id||ph.project_id,duration_days:Number(ph.duration_days||0),wbs_code:code,owner_id:ph.owner_id||''}); }
  if(n.type==='group'){ const g=n.raw; await PUT('/api/work-groups/'+n.entityId,{project_id:g.project_id,phase_name:g.phase_name,group_name:name,owner_id:g.owner_id||'',start_date:g.start_date||'',due_date:g.due_date||'',status,progress:Number(g.progress||0),display_order:Number(g.display_order||0),notes:g.notes||'',parent_id:g.parent_id||g.phase_name,duration_days:Number(g.duration_days||0),wbs_code:code}); }
  if(n.type==='task'){ const t=n.raw; await PUT('/api/tasks/'+n.entityId,{title:name,project_id:t.project_id,assignee_id:owner,description:t.description||'',priority,status,due_date:finish,phase_name:t.phase_name,work_group_id:t.work_group_id,send_email:!!t.send_email,start_date:start,reviewer_id:v('s-reviewer'),approver_id:v('s-approver'),watcher_ids:v('s-watchers'),progress,checklist:t.checklist||'[]',dependency_task_id:t.dependency_task_id||'',completed_at:t.completed_at||'',parent_id:t.parent_id||t.work_group_id||t.phase_name,duration_days:duration,wbs_code:code}); }
  await logInteraction('schedule_save', n.type, n.entityId); toast('Đã lưu thay đổi schedule'); await loadAll();

async function deleteScheduleSelected(){
  const n=selectedScheduleNode(); if(!n)return;
  const childCount = allScheduleNodes(n.children||[]).length;
  if(!confirm(`Xóa ${scheduleCfg(n.type).label} này${childCount?` và ${childCount} dữ liệu con`:''}?`)) return;
  if(n.type==='project') await DEL('/api/projects/'+n.entityId);
  if(n.type==='phase') await DEL('/api/project-phases/'+n.entityId);
  if(n.type==='group') await DEL('/api/work-groups/'+n.entityId);
  if(n.type==='task') await DEL('/api/tasks/'+n.entityId);
  await logInteraction('schedule_delete', n.type, n.entityId);
  toast('Đã xóa khỏi schedule');
  scheduleSelectedId=''; await loadAll();
}

      rows.push({...mail, mail_no:idx+1, person_name:person.person_name, person_email:person.email, person_type:person.person_type, position:person.position});

function phasesForProject(projectId=''){
  const names = new Set(PHASES);
  state.projectPhases.filter(ph=>!projectId || ph.project_id===projectId).sort((a,b)=>(a.display_order||0)-(b.display_order||0)).forEach(ph=>names.add(ph.phase_name));
  state.groups.filter(g=>!projectId || g.project_id===projectId).forEach(g=>names.add(g.phase_name));
  return Array.from(names).filter(Boolean);
}
function projectPhaseSelect(label,id,projectId='',value=''){
  const phases = phasesForProject(projectId);
  if(value && !phases.includes(value)) phases.push(value);
  return selectField(label,id,phases,value||phases[0]||'');
}
function taskProjectSelect(value=''){
  return `<div class="field"><label>Dự án</label><select id="f-project_id" onchange="syncTaskGroups(true)"><option value="">- Chọn -</option>${state.projects.map(p=>`<option value="${esc(p.id)}"${value===p.id?' selected':''}>${esc(p.name)}</option>`).join('')}</select></div>`;
}
function taskPhaseSelect(value='', projectId=''){
  const phases = phasesForProject(projectId);
  if(value && !phases.includes(value)) phases.push(value);
  return `<div class="field"><label>Phase</label><select id="f-phase_name" onchange="syncTaskGroups(false)">${phases.map(ph=>`<option value="${esc(ph)}"${value===ph?' selected':''}>${esc(ph)}</option>`).join('')}</select></div>`;
}
function taskGroupSelect(projectId='', phaseName='', value=''){
  const groups = state.groups.filter(g=>(!projectId || g.project_id===projectId) && (!phaseName || g.phase_name===phaseName));
  return `<div class="field"><label>Work Group</label><select id="f-work_group_id"><option value="">- Chọn group -</option>${groups.map(g=>`<option value="${esc(g.id)}"${value===g.id?' selected':''}>${esc(g.group_name)}</option>`).join('')}</select></div>`;
}
function syncTaskGroups(resetPhase=false){
  const pid = v('f-project_id');
  const phaseEl = $('f-phase_name');
  if(phaseEl){
    const current = phaseEl.value;
    const phases = phasesForProject(pid);
    phaseEl.innerHTML = phases.map(ph=>`<option value="${esc(ph)}">${esc(ph)}</option>`).join('');
    if(phases.includes(current)) phaseEl.value = current;
  }
  if(resetPhase && pid && phaseEl){
    const project = state.projects.find(p=>p.id===pid);
    if(project?.current_phase) setSelectValue('f-phase_name', project.current_phase, project.current_phase);
  }
  const phase = v('f-phase_name');
  const groupEl = $('f-work_group_id');
  if(!groupEl) return;
  const groups = state.groups.filter(g=>(!pid || g.project_id===pid) && (!phase || g.phase_name===phase));
  const old = groupEl.value;
  groupEl.innerHTML = `<option value="">- Chọn group -</option>${groups.map(g=>`<option value="${esc(g.id)}">${esc(g.group_name)}</option>`).join('')}`;
  if(groups.some(g=>g.id===old)) groupEl.value = old;
  else if(groups.length) groupEl.value = groups[0].id;
}

    if(kind==='eoffice'){ body={direction:v('f-direction'),doc_no:v('f-doc_no'),title:v('f-title'),project_id:v('f-project_id'),sender:v('f-sender'),receiver:v('f-receiver'),owner_id:v('f-owner_id'),status:v('f-status'),due_date:v('f-due_date'),link:v('f-link'),notes:v('f-notes')}; path=item?'/api/eoffice/'+item.id:'/api/eoffice'; }
    if(kind==='bom'){ body={project_id:v('f-project_id'),bom_no:v('f-bom_no'),revision:v('f-revision'),title:v('f-title'),status:v('f-status'),currency:v('f-currency')}; path=item?'/api/boms/'+item.id:'/api/boms'; }
    if(kind==='bomItem'){ body={bom_id:v('f-bom_id'),material_id:v('f-material_id'),item_no:v('f-item_no'),description:v('f-description'),qty:Number(v('f-qty')||0),unit:v('f-unit'),unit_price:Number(v('f-unit_price')||0),currency:v('f-currency'),supplier:v('f-supplier'),lead_time:v('f-lead_time'),status:v('f-status'),remark:v('f-remark')}; path='/api/bom-items'; method='POST'; }
    if(kind==='user'){ body={full_name:v('f-full_name'),email:v('f-email'),phone:v('f-phone'),department:v('f-department'),position:v('f-position'),skills:v('f-skills'),role:v('f-role'),status:v('f-status')}; path='/api/users/'+item.id; method='PUT'; }
    if(kind==='notification'){ body={user_id:v('f-user_id'),title:v('f-title'),message:v('f-message'),notification_type:v('f-notification_type'),related_module:v('f-related_module'),related_id:v('f-related_id')}; path='/api/notifications'; method='POST'; }
    if(kind==='emailLog'){ body={subject:v('f-subject'),recipients:v('f-recipients'),module:v('f-module'),related_id:v('f-related_id'),status:v('f-status')}; path='/api/email-logs'; method='POST'; }
    if(kind==='profile'){ body={full_name:v('f-full_name'),phone:v('f-phone'),department:v('f-department'),position:v('f-position'),skills:v('f-skills')}; path='/api/auth/me'; method='PUT'; if(v('f-old_password')&&v('f-new_password')) await POST('/api/auth/change-password',{old_password:v('f-old_password'),new_password:v('f-new_password')}); }
    if(kind==='taskComment'){ body={task_id:v('f-task_id'),comment:v('f-comment'),attachment_url:v('f-attachment_url')}; path='/api/task-comments'; method='POST'; }
    if(kind==='documentRevision'){ body={document_id:v('f-document_id'),revision:v('f-revision'),file_link:v('f-file_link'),status:v('f-status'),issued_at:v('f-issued_at'),notes:v('f-notes')}; path='/api/document-revisions'; method='POST'; }
    if(kind==='documentComment'){ body={document_id:v('f-document_id'),source:v('f-source'),comment:v('f-comment'),response:v('f-response'),owner_id:v('f-owner_id'),due_date:v('f-due_date'),status:v('f-status')}; path='/api/document-comments'; method='POST'; }
    if(kind==='transmittal'){ body={project_id:v('f-project_id'),transmittal_no:v('f-transmittal_no'),direction:v('f-direction'),recipients:v('f-recipients'),purpose:v('f-purpose'),document_ids:v('f-document_ids'),status:v('f-status'),sent_at:v('f-sent_at')}; path='/api/transmittals'; method='POST'; }
    if(kind==='conversation'){ body={conversation_name:v('f-conversation_name'),conversation_type:v('f-conversation_type'),project_id:v('f-project_id'),task_id:v('f-task_id'),member_user_ids:v('f-member_user_ids')}; path='/api/conversations'; method='POST'; }
    if(kind==='rfq'){ body={bom_id:v('f-bom_id'),rfq_no:v('f-rfq_no'),supplier:v('f-supplier'),due_date:v('f-due_date'),status:v('f-status'),notes:v('f-notes')}; path='/api/rfqs'; method='POST'; }
    if(kind==='quotation'){ body={rfq_id:v('f-rfq_id'),supplier:v('f-supplier'),amount:Number(v('f-amount')||0),currency:v('f-currency'),lead_time:v('f-lead_time'),status:v('f-status'),file_link:v('f-file_link')}; path='/api/quotations'; method='POST'; }
    if(kind==='delivery'){ body={bom_item_id:v('f-bom_item_id'),po_no:v('f-po_no'),supplier:v('f-supplier'),ordered_date:v('f-ordered_date'),promised_date:v('f-promised_date'),received_date:v('f-received_date'),qty_ordered:Number(v('f-qty_ordered')||0),qty_received:Number(v('f-qty_received')||0),status:v('f-status'),notes:v('f-notes')}; path='/api/deliveries'; method='POST'; }
    if(kind==='timesheet'){ body={member_id:v('f-member_id'),project_id:v('f-project_id'),task_id:v('f-task_id'),work_date:v('f-work_date'),hours:Number(v('f-hours')||0),work_type:v('f-work_type'),notes:v('f-notes')}; path='/api/timesheets'; method='POST'; }
    if(!path) return;
    if(method==='PUT') await PUT(path,body); else await POST(path,body);
    await logInteraction(item ? 'update' : 'create', kind, `${method} ${path}`);
    const extraBom = kind==='bomItem' ? v('f-bom_id') : null;
    closeModal(); toast('Đã lưu'); await loadAll();
    if(kind==='profile'){ currentUser = await GET('/api/auth/me'); localStorage.setItem('autoteam_user', JSON.stringify(currentUser)); hydrateUser(); }
    if(extraBom && currentPanel==='bom') showBomDetail(extraBom);
  }catch(e){ toast(e.message,'err'); }
}

async function globalSearch(q){
  const pop = $('search-pop');
  if(!q || q.length<2){ pop.classList.add('hidden'); return; }
  const res = await safeGet('/api/search?q='+encodeURIComponent(q), null);
  if(!res){ pop.classList.add('hidden'); return; }
  const sections = [
    ['Projects',res.projects,'name','client','projects'],
    ['Tasks',res.tasks,'title','status','tasks'],
    ['Documents',res.documents,'name','status','documents'],
    ['Materials',res.materials,'name','item_code','materials']
  ];
  pop.innerHTML = sections.map(([title,rows,a,b,panel])=>rows?.length?`<div style="padding:10px;border-bottom:1px solid var(--line)"><div class="sub mono">${title}</div>${rows.map(r=>`<div class="mini-row" style="margin-top:7px" onclick="showPanel('${panel}');$('search-pop').classList.add('hidden')"><span class="dot"></span><div><b>${esc(r[a])}</b><div class="sub">${esc(r[b]||'')}</div></div></div>`).join('')}</div>`:'').join('') || `<div class="empty">Không tìm thấy</div>`;
  pop.classList.remove('hidden');
}
document.addEventListener('click', e => { if(!e.target.closest('.global-search')) $('search-pop').classList.add('hidden'); });

loadAppInfo();
checkAuth();
</script>
